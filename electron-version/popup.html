<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Translation</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #6b6b80;
      --border: #e0e0e6;
      --primary: #4a6cf7;
      --primary-light: #eef1ff;
      --placeholder: #b0b0c0;
      --source-bg: #f8f8fa;
      --source-border: #eee;
      --header-bg: #4a6cf7;
      --footer-border: #eee;
    }
    body.dark-mode {
      --bg: #15152a;
      --text: #d0d0e8;
      --text-secondary: #8080a8;
      --border: #2a2a48;
      --primary: #6b8aff;
      --primary-light: #252545;
      --placeholder: #606080;
      --source-bg: #1a1a35;
      --source-border: #2a2a48;
      --header-bg: #1e1e40;
      --footer-border: #2a2a48;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 0;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--header-bg);
      color: white;
      font-size: 12px;
      font-weight: 600;
      -webkit-app-region: drag;
      flex-shrink: 0;
    }
    .header span { display: flex; align-items: center; gap: 6px; }
    .close-btn {
      -webkit-app-region: no-drag;
      background: none;
      border: none;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      padding: 0 4px;
    }
    .close-btn:hover { color: white; }
    .source-text {
      padding: 10px 12px;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--source-bg);
      border-bottom: 1px solid var(--source-border);
      max-height: 80px;
      overflow-y: auto;
      word-wrap: break-word;
      flex-shrink: 0;
    }
    .translation {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
      overflow-y: auto;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .placeholder { color: var(--placeholder); font-size: 13px; }
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 12px;
      border-top: 1px solid var(--footer-border);
      font-size: 11px;
      color: var(--text-secondary);
      flex-shrink: 0;
    }
    .footer .actions { display: flex; gap: 8px; }
    .footer button {
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .footer button:hover { background: var(--primary-light); }
  </style>
</head>
<body>
  <div id="app">
    <div class="header">
      <span>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 7 4"/><polyline points="17 4 20 4 20 7"/>
          <polyline points="20 17 20 20 17 20"/><polyline points="7 20 4 20 4 17"/>
          <line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
        LinguaLAN
      </span>
      <button class="close-btn" id="closeBtn">✕</button>
    </div>
    <div class="source-text" id="sourceDisplay"></div>
    <div class="translation" id="translationDisplay">
      <div class="placeholder">Loading translation...</div>
    </div>
    <div class="footer">
      <span id="modelInfo"></span>
      <div class="actions">
        <button id="copyBtn">Copy</button>
        <button id="pinBtn">Pin</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
