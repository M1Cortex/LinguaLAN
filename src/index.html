<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinguaLAN</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 7 4"/><polyline points="17 4 20 4 20 7"/>
          <polyline points="20 17 20 20 17 20"/><polyline points="7 20 4 20 4 17"/>
          <line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
        <span>LinguaLAN</span>
      </div>
      <div class="header-controls">
        <div class="lang-selectors">
          <select id="sourceLang"></select>
          <button id="swapBtn" title="Sprachen tauschen">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 16l-4-4m0 0l4-4m-4 4h18"/><path d="M17 8l4 4m0 0l-4 4m4-4H3"/>
            </svg>
          </button>
          <select id="targetLang"></select>
        </div>
        <button id="themeToggle" class="icon-btn" title="Dark/Light Mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <button id="settingsBtn" class="icon-btn" title="Einstellungen">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
        <div class="model-indicator" id="modelIndicator">
          <span class="dot" id="modelDot"></span>
          <span id="modelName">Kein Modell</span>
        </div>
      </div>
    </header>

    <main>
      <div class="translation-panels">
        <div class="panel panel-source">
          <div class="panel-header">
            <span class="panel-label" id="sourceLabel">Quelle</span>
            <button id="clearBtn" class="text-btn">Leeren</button>
          </div>
          <textarea id="sourceText" placeholder="Text zum Übersetzen eingeben..." spellcheck="true"></textarea>
          <div class="panel-footer">
            <span id="charCount">0</span>
            <span id="statusMsg"></span>
          <span id="clipboardBadge" class="clipboard-badge hidden">📋 Auto</span>
          </div>
        </div>
        <div class="panel panel-target">
          <div class="panel-header">
            <span class="panel-label" id="targetLabel">Ziel</span>
            <button id="copyBtn" class="text-btn">Kopieren</button>
          </div>
          <div id="targetText" class="target-content">
            <div class="placeholder">Übersetzung erscheint hier...</div>
          </div>
          <div class="panel-footer">
            <span id="translationInfo"></span>
          </div>
        </div>
      </div>
    </main>

    <footer>
      <button id="translateBtn" class="translate-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="4 7 4 4 7 4"/><polyline points="17 4 20 4 20 7"/>
          <polyline points="20 17 20 20 17 20"/><polyline points="7 20 4 20 4 17"/>
          <line x1="12" y1="7" x2="12" y2="17"/><line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
        Übersetzen
      </button>
    </footer>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="modal hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Einstellungen</h3>
        <button id="closeSettings" class="icon-btn">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>Ollama Engine Status</label>
          <div id="ollamaStatusBar" class="ollama-status-bar">
            <div class="ollama-status-left">
              <span class="dot" id="ollamaDot"></span>
              <span id="ollamaStatusText">Prüfe...</span>
            </div>
            <div id="ollamaActions" class="ollama-actions">
              <button id="startOllamaBtn" class="btn btn-sm hidden">Starten</button>
              <button id="stopOllamaBtn" class="btn btn-sm hidden">Stoppen</button>
              <button id="downloadOllamaBtn" class="btn btn-sm btn-primary hidden">Download</button>
              <button id="installOllamaBtn" class="btn btn-sm hidden">Installieren</button>
              <button id="refreshOllamaBtn" class="btn btn-sm" title="Status aktualisieren">⟳</button>
            </div>
          </div>
          <div id="ollamaProgress" class="ollama-progress hidden">
            <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            <span id="progressText" class="progress-label"></span>
          </div>
          <div id="ollamaModelPull" class="ollama-model-pull hidden">
            <select id="pullModelSelect" class="model-pull-select">
              <option value="qwen2.5:3b">Qwen 2.5 (3B) - empfohlen</option>
              <option value="translategemma:4b">TranslateGemma (4B) - empfohlen</option>
              <option value="llama3.2:3b">Llama 3.2 (3B)</option>
              <option value="gemma3:2b">Gemma 3 (2B)</option>
              <option value="llama3.2:1b">Llama 3.2 (1B) - schnell</option>
              <option value="mistral:7b">Mistral (7B)</option>
            </select>
            <button id="pullModelBtn" class="btn btn-sm btn-primary">Modell laden</button>
          </div>
        </div>
        <div class="form-group">
          <label for="ollamaUrl">Ollama API URL</label>
          <input type="text" id="ollamaUrl" value="http://localhost:11434">
        </div>
        <div class="form-group">
          <label for="modelSelect">Übersetzungs-Modell</label>
          <div class="model-select-row">
            <select id="modelSelect"><option value="">Modelle laden...</option></select>
            <button id="refreshModels" class="text-btn">⟳</button>
          </div>
        </div>
        <div class="form-group">
          <label for="systemPrompt">System-Prompt</label>
          <textarea id="systemPrompt" rows="3">Übersetze den folgenden Text von {source} nach {target}. Gib NUR die Übersetzung zurück, ohne Erklärungen oder Zusätze.</textarea>
        </div>
        <div class="form-group">
          <label class="checkbox-row">
            <input type="checkbox" id="clipboardWatch">
            <span>Zwischenablage automatisch überwachen (Clipboard-Monitoring)</span>
          </label>
        </div>
        <div class="form-group">
          <label for="hotkeyInput">Globaler Hotkey (zum Übersetzen aus anderen Apps)</label>
          <div class="hotkey-row">
            <input type="text" id="hotkeyInput" readonly placeholder="Kombination drücken...">
            <button id="clearHotkeyBtn" class="text-btn">Zurücksetzen</button>
          </div>
          <p class="form-hint">Klick in das Feld und drücke die gewünschte Tastenkombination. <br>Strg/Ctrl, Alt und Umschalt werden unterstützt.</p>
        </div>
      </div>
      <div class="modal-footer">
        <span id="connectionStatus" class="connection-status"></span>
        <button id="saveSettings" class="btn btn-primary">Speichern</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
